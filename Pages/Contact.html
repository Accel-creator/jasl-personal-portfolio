<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact: Personal Portfolio</title>
  <link rel="stylesheet" href="../CSS/Styles.css" />
</head>
<body>

  <nav>
    <a href="Home.html">Home</a>
    <a href="About.html">About</a>
    <a href="Projects.html">Projects</a>
    <a href="Academic.html">Academic</a>
    <a href="Contact.html" class="active">Contact</a>
  </nav>

  <main class="page">
    <h1 class="page-title">Contact</h1>

    <div class="contact-layout">

      <!-- LEFT: Form -->
      <form
        class="contact-form"
        action="https://formsubmit.co/laxaarchie24@gmail.com"
        method="POST"
      >
        <!-- FormSubmit config: disable captcha, redirect back to page -->
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_next" value="YOUR_SITE_URL_HERE/contact.html" />

        <div class="contact-field">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />
        </div>

        <div class="contact-field">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required />
        </div>

        <div class="contact-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="What's on your mind?" required></textarea>
        </div>

        <button type="submit" class="contact-submit">Send Message</button>
      </form>

      <!-- RIGHT: Info -->
      <div class="contact-info-panel">

        <div class="contact-info-block">
          <p class="contact-info-label">Email</p>
          <p class="contact-info-value">laxaarchie24@gmail.com</p>
        </div>

        <div class="contact-info-block">
          <p class="contact-info-label">Contact Number</p>
          <p class="contact-info-value">09123456789</p>
        </div>

        <div class="contact-info-block">
          <p class="contact-info-label">Based in</p>
          <p class="contact-info-value">Philippines</p>
        </div>

      </div>

    </div>
  </main>

</body>
</html>
